# SPDX-License-Identifier: GPL-3.0-or-later
#
# Distro packaging matrix. Each job builds veiland's native package
# inside that distro's own container, so the packages are validated on
# real distro tooling (the dev host is NixOS and can't run
# makepkg/dpkg-buildpackage/rpmbuild). This is separate from ci.yml (the
# Nix gate) and does not affect it.
#
# On push/PR the packages are kept as workflow artifacts (validation).
# When a Release is published, each job also attaches its package to that
# release as a downloadable asset (see the "Attach to release" steps).

name: packages

on:
  push:
    branches: [master]
  pull_request:
  # When a GitHub Release is published (from a pushed tag), rebuild the
  # packages against the tagged tree and attach them as release assets.
  release:
    types: [published]

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: true

# The release-upload steps need write access to create release assets.
permissions:
  contents: write

jobs:
  arch:
    name: Arch (PKGBUILD)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build tooling
        # base-devel gives makepkg + fakeroot; the rest are this
        # package's makedepends. makepkg refuses to run as root, so we
        # add an unprivileged 'builder' user below.
        run: |
          # github-cli: the container image has no gh; the "Attach to
          # release" step below needs it (the runner's pre-installed gh is
          # not on PATH inside the container).
          pacman -Syu --noconfirm base-devel git rust cargo pkgconf \
            pam libglvnd mesa libdrm wayland libxkbcommon libjpeg-turbo \
            github-cli
          useradd -m builder

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # makepkg builds from $srcdir; our PKGBUILD does
          # `cd "$srcdir/veiland"`, so stage the checkout there.
          set -eux
          workdir=$(mktemp -d)
          cp packaging/arch/PKGBUILD "$workdir/PKGBUILD"
          mkdir -p "$workdir/src"
          # Copy the whole repo (the build needs the full workspace +
          # packaging/ assets referenced by package()).
          git config --global --add safe.directory "$PWD"
          git archive --format=tar HEAD | tar -x -C "$workdir/src" \
            --one-top-level=veiland
          chown -R builder:builder "$workdir"
          cd "$workdir"
          # --noextract: source=() has nothing to fetch, we pre-staged
          # src/. --nodeps: deps already installed above. --skipinteg:
          # no checksums with a local tree.
          sudo -u builder makepkg --noconfirm --nodeps --skipinteg \
            --noextract -f
          ls -la ./*.pkg.tar.*
          # makepkg built under the temp workdir, outside the workspace.
          # Copy the package into $GITHUB_WORKSPACE/dist so the later
          # upload steps have a stable, in-workspace path (matching the
          # debian/fedora jobs).
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp ./*.pkg.tar.* "$GITHUB_WORKSPACE/dist/"
          ls -la "$GITHUB_WORKSPACE/dist/"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-arch
          path: dist/*.pkg.tar.*
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.pkg.tar.* --clobber

  debian:
    name: Debian (.deb)
    runs-on: ubuntu-latest
    # debian:testing (trixie), not stable: stable's libturbojpeg (2.1.5)
    # is below the turbojpeg crate's >= 3.0 floor. Testing ships 3.x.
    # The produced .deb therefore targets trixie/newer, not oldstable.
    container: debian:testing
    steps:
      - name: Install build tooling
        run: |
          apt-get update
          # build-essential + debhelper give dpkg-buildpackage/dh; the
          # rest are this package's Build-Depends. NOT apt's cargo/rustc:
          # debian:stable ships rustc 1.85, but the dependency tree needs
          # 1.89 (cosmic-text, image, smol_str). We install a current
          # toolchain via rustup instead (see below), leaving Cargo.lock
          # and the other distros/flake untouched. curl+ca-certificates
          # are for the rustup installer.
          # gh: the container image has no github CLI; the "Attach to
          # release" step below needs it (the runner's pre-installed gh is
          # not on PATH inside the container).
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts pkg-config \
            curl ca-certificates gh \
            libpam0g-dev libgl-dev libegl-dev libgbm-dev \
            libdrm-dev libwayland-dev libxkbcommon-dev libturbojpeg0-dev

      - name: Install Rust (rustup)
        run: |
          set -eux
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          # Put cargo on PATH for subsequent steps.
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # dpkg-buildpackage expects debian/ at the top of the source
          # tree; ours lives under packaging/debian/, so stage it there.
          set -eux
          # debian/rules calls cargo; make sure rustup's toolchain is on
          # PATH inside the dpkg-buildpackage subprocess too.
          export PATH="$HOME/.cargo/bin:$PATH"
          cp -r packaging/debian debian
          # -b: binary-only. -us -uc: unsigned. -d: skip the
          # Build-Depends sanity check (we installed them above).
          dpkg-buildpackage -b -us -uc -d
          # dpkg writes the .deb to the PARENT dir; copy it into the
          # workspace so upload-artifact can find it (no '..' allowed).
          mkdir -p dist
          cp ../*.deb dist/
          ls -la dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-debian
          path: dist/*.deb
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.deb --clobber

  fedora:
    name: Fedora (.rpm)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build tooling
        run: |
          # gh: needed by the "Attach to release" step below (the runner's
          # pre-installed gh is not on PATH inside the container).
          dnf -y install rpm-build rpmdevtools tar git gh \
            cargo rust pkgconf-pkg-config \
            pam-devel mesa-libGL-devel mesa-libEGL-devel mesa-libgbm-devel \
            libdrm-devel wayland-devel libxkbcommon-devel turbojpeg-devel

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # rpmbuild wants the source tree as a tarball named
          # %{name}-%{version}.tar.gz whose top dir is %{name}-%{version}.
          set -eux
          rpmdev-setuptree
          # Derive the version from the spec so the tarball name always
          # matches what %autosetup expects (was hardcoded and drifted
          # behind a version bump, breaking %prep).
          ver=$(rpmspec -q --qf '%{version}\n' packaging/rpm/veiland.spec | head -1)
          git config --global --add safe.directory "$PWD"
          # Stage a clean copy of the tree under veiland-$ver/ and tar it.
          git archive --format=tar --prefix="veiland-$ver/" HEAD \
            | gzip > "$HOME/rpmbuild/SOURCES/veiland-$ver.tar.gz"
          rpmbuild -ba packaging/rpm/veiland.spec
          ls -la "$HOME"/rpmbuild/RPMS/*/*.rpm
          # rpmbuild writes outside the workspace; upload-artifact
          # forbids '..' in paths, so copy the RPMs into the workspace.
          mkdir -p dist
          cp "$HOME"/rpmbuild/RPMS/*/*.rpm dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-fedora
          path: dist/*.rpm
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.rpm --clobber
