# SPDX-License-Identifier: GPL-3.0-or-later
#
# Distro packaging matrix. Each job builds veiland's native package
# inside that distro's own container, so the packages are validated on
# real distro tooling (the dev host is NixOS and can't run
# makepkg/dpkg-buildpackage/rpmbuild). This is separate from ci.yml (the
# Nix gate) and does not affect it.
#
# On push/PR the packages are kept as workflow artifacts (validation).
# When a Release is published, each job also attaches its package to that
# release as a downloadable asset (see the "Attach to release" steps).
#
# Each build job is followed by an install job (*-install) that takes
# the built package into a PRISTINE container of the same distro and
# installs it with the real package manager, mirroring the README's
# install instructions. The build containers can't test this: their
# build deps leave every runtime library already installed, so a wrong
# or missing runtime dependency would go unnoticed there. The install
# jobs validate dependency resolution, maintainer scripts, file layout,
# and (via ldd) that every installed binary's shared libraries resolve.
# A full smoke run isn't possible in CI — veiland needs a live Wayland
# session — so resolved linkage + file layout is the deepest check
# available here.

name: packages

on:
  push:
    branches: [master]
  pull_request:
  # When a GitHub Release is published (from a pushed tag), rebuild the
  # packages against the tagged tree and attach them as release assets.
  release:
    types: [published]

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: true

# The release-upload steps need write access to create release assets.
permissions:
  contents: write

jobs:
  arch:
    name: Arch (PKGBUILD)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build tooling
        # base-devel gives makepkg + fakeroot; the rest are this
        # package's makedepends. makepkg refuses to run as root, so we
        # add an unprivileged 'builder' user below.
        run: |
          pacman -Syu --noconfirm base-devel git rust cargo pkgconf \
            pam libglvnd mesa libdrm wayland libxkbcommon
          useradd -m builder

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # The PKGBUILD builds from the v$pkgver release tarball (that is
          # what the AUR needs), but CI must build the *checked-out tree*:
          # push/PR validate HEAD, and the tag may not even exist yet when
          # pkgver is bumped ahead of a release. So stage the checkout
          # under the directory name the tarball would extract to, and
          # pre-create a placeholder tarball so makepkg (--noextract
          # --skipinteg below) sees the source as already fetched instead
          # of downloading the real one.
          set -eux
          workdir=$(mktemp -d)
          cp packaging/arch/PKGBUILD "$workdir/PKGBUILD"
          mkdir -p "$workdir/src"
          ver=$(sed -n 's/^pkgver=//p' "$workdir/PKGBUILD")
          touch "$workdir/veiland-$ver.tar.gz"
          # Copy the whole repo (the build needs the full workspace +
          # packaging/ assets referenced by package()).
          git config --global --add safe.directory "$PWD"
          git archive --format=tar HEAD | tar -x -C "$workdir/src" \
            --one-top-level="veiland-$ver"
          chown -R builder:builder "$workdir"
          cd "$workdir"
          # --noextract: source=() has nothing to fetch, we pre-staged
          # src/. --nodeps: deps already installed above. --skipinteg:
          # no checksums with a local tree.
          sudo -u builder makepkg --noconfirm --nodeps --skipinteg \
            --noextract -f
          ls -la ./*.pkg.tar.*
          # makepkg built under the temp workdir, outside the workspace.
          # Copy the package into $GITHUB_WORKSPACE/dist so the later
          # upload steps have a stable, in-workspace path (matching the
          # debian/fedora jobs).
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp ./*.pkg.tar.* "$GITHUB_WORKSPACE/dist/"
          ls -la "$GITHUB_WORKSPACE/dist/"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-arch
          path: dist/*.pkg.tar.*
          if-no-files-found: error

      - name: Install gh
        if: github.event_name == 'release'
        # Only needed to attach release assets; the container has no gh
        # and the runner's pre-installed gh is not on PATH inside it.
        # Kept out of the build-tooling step so push/PR validation, which
        # never uploads, doesn't install it.
        run: pacman -Sy --noconfirm github-cli

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.pkg.tar.* --clobber --repo "${{ github.repository }}"

  arch-install:
    name: Arch (install check)
    runs-on: ubuntu-latest
    # A pristine container — nothing installed by the build job exists
    # here, so `pacman -U` must resolve the package's depends=() from
    # the repos for real.
    container: archlinux:latest
    needs: arch
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: veiland-arch
          path: dist

      - name: Install package
        run: |
          set -eux
          # Sync the package databases (the container image ships without
          # them) and bring the base system current so the freshly-built
          # package's shared-library deps match the repo versions.
          pacman -Syu --noconfirm
          pacman -U --noconfirm dist/*.pkg.tar.*

      - name: Verify installed layout and linkage
        run: |
          set -eux
          # Everything packaging/arch/PKGBUILD package() promises.
          for b in veiland veiland-wallpaper veiland-clock \
                   veiland-particles veiland-vignette veiland-label \
                   veiland-sakura veiland-snow veiland-rain \
                   veiland-embers veiland-fireflies veiland-gradient \
                   veiland-parallax veiland-blobs veiland-raymarcher; do
            command -v "$b"
            test -x "/usr/bin/$b"
            # The binaries can't actually run in CI (no Wayland session),
            # but every shared library must resolve — this is what
            # catches a missing or misnamed runtime dependency.
            if ldd "/usr/bin/$b" | grep 'not found'; then
              echo "unresolved shared libraries in $b" >&2
              exit 1
            fi
          done
          test -f /etc/pam.d/veiland
          test -f /usr/share/veiland/config.example.toml
          test -f /usr/share/veiland/sakura-dusk.jpg
          test -f /usr/share/veiland/examples/sakura.toml
          test ! -e /usr/share/veiland/examples/hotplug-repro.toml
          # The install-time path rewrite: the shipped example must point
          # at the installed wallpaper, not the repo-relative path.
          grep -q 'path = "/usr/share/veiland/sakura-dusk.jpg"' \
            /usr/share/veiland/examples/sakura.toml

  debian:
    name: Debian (.deb)
    runs-on: ubuntu-latest
    # Pinned to debian:13, NOT debian:testing. `testing` is a moving tag:
    # when this job was written it was trixie, but trixie became Debian 13
    # stable and the tag rolled forward to the next release. The .deb was
    # then built on, and install-checked on, a Debian nobody runs — a
    # circular test that stayed green while the shipped package was
    # uninstallable on real Debian stable. Pin to the release we target.
    container: debian:13
    steps:
      - name: Install build tooling
        run: |
          apt-get update
          # build-essential + debhelper give dpkg-buildpackage/dh; the
          # rest are this package's Build-Depends. NOT apt's cargo/rustc:
          # debian:stable ships rustc 1.85, but the dependency tree needs
          # 1.89 (cosmic-text, image, smol_str). We install a current
          # toolchain via rustup instead (see below), leaving Cargo.lock
          # and the other distros/flake untouched. curl+ca-certificates
          # are for the rustup installer.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts pkg-config \
            curl ca-certificates \
            libpam0g-dev libgl-dev libegl-dev libgbm-dev \
            libdrm-dev libwayland-dev libxkbcommon-dev

      - name: Install Rust (rustup)
        run: |
          set -eux
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          # Put cargo on PATH for subsequent steps.
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # dpkg-buildpackage expects debian/ at the top of the source
          # tree; ours lives under packaging/debian/, so stage it there.
          set -eux
          # debian/rules calls cargo; make sure rustup's toolchain is on
          # PATH inside the dpkg-buildpackage subprocess too.
          export PATH="$HOME/.cargo/bin:$PATH"
          cp -r packaging/debian debian
          # -b: binary-only. -us -uc: unsigned. -d: skip the
          # Build-Depends sanity check (we installed them above).
          dpkg-buildpackage -b -us -uc -d
          # dpkg writes the .deb to the PARENT dir; copy it into the
          # workspace so upload-artifact can find it (no '..' allowed).
          mkdir -p dist
          cp ../*.deb dist/
          ls -la dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-debian
          path: dist/*.deb
          if-no-files-found: warn

      - name: Install gh
        if: github.event_name == 'release'
        # gh is not in Debian's repos; install it from GitHub's official
        # apt repo. Only needed to attach release assets, so gated on the
        # release event and kept out of the always-run build-tooling step.
        run: |
          set -eux
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gh

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        # --repo is required: without it gh infers owner/repo by shelling
        # out to git, which fails in the container (the checkout is flagged
        # dubious-ownership, so git reports "not a git repository").
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.deb --clobber --repo "${{ github.repository }}"

  debian-install:
    name: Debian (install check)
    runs-on: ubuntu-latest
    # Same pinned image as the build job (see the note there), but a
    # pristine container: apt must pull in the ${shlibs:Depends} closure
    # itself, which the build container can't demonstrate.
    container: debian:13
    needs: debian
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: veiland-debian
          path: dist

      - name: Install package
        run: |
          set -eux
          apt-get update
          # --no-install-recommends: prove the hard Depends alone are a
          # complete closure, exactly what a minimal user system gets.
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            --no-install-recommends ./dist/*.deb

      - name: Verify installed layout and linkage
        run: |
          set -eux
          # Everything packaging/debian/veiland.install (+ dh_installpam)
          # promises.
          for b in veiland veiland-wallpaper veiland-clock \
                   veiland-particles veiland-vignette veiland-label \
                   veiland-sakura veiland-snow veiland-rain \
                   veiland-embers veiland-fireflies veiland-gradient \
                   veiland-parallax veiland-blobs veiland-raymarcher; do
            command -v "$b"
            test -x "/usr/bin/$b"
            # The binaries can't actually run in CI (no Wayland session),
            # but every shared library must resolve — this is what
            # catches a missing or misnamed runtime dependency.
            if ldd "/usr/bin/$b" | grep 'not found'; then
              echo "unresolved shared libraries in $b" >&2
              exit 1
            fi
          done
          test -f /etc/pam.d/veiland
          test -f /usr/share/veiland/config.example.toml
          test -f /usr/share/veiland/sakura-dusk.jpg
          test -f /usr/share/veiland/examples/sakura.toml
          test ! -e /usr/share/veiland/examples/hotplug-repro.toml
          # The install-time path rewrite: the shipped example must point
          # at the installed wallpaper, not the repo-relative path.
          grep -q 'path = "/usr/share/veiland/sakura-dusk.jpg"' \
            /usr/share/veiland/examples/sakura.toml

  ubuntu-install:
    name: Ubuntu ${{ matrix.release }} (install check)
    runs-on: ubuntu-latest
    needs: debian
    # Ubuntu installs the *Debian* .deb — there is no separate Ubuntu build.
    # The package carries nothing distro-specific (same binaries, same PAM
    # file, same dependencies), so building it twice would only mean two
    # artifacts to name, test and attach to every release. This job proves
    # the artifact that actually ships also installs on Ubuntu.
    #
    # Ubuntu was previously unsupported because every released Ubuntu is on
    # libjpeg-turbo 2.x, below the floor the turbojpeg crate forced. That
    # dependency is gone, so Ubuntu works again.
    #
    # 24.04 is the floor, and it is a real one: the .deb is built on Debian
    # 13, so dpkg-shlibdeps stamps `libc6 (>= 2.39)` from that glibc. Ubuntu
    # 24.04 ships exactly 2.39 and satisfies it; 22.04 ships 2.35 and cannot.
    # Supporting 22.04 would mean building a second .deb on an older host,
    # which we deliberately do not do. A failure here on a *new* Ubuntu most
    # likely means a floor of the same kind was raised again.
    strategy:
      fail-fast: false
      matrix:
        release: ['24.04', 'latest']
    container: ubuntu:${{ matrix.release }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: veiland-debian
          path: dist

      - name: Install package
        run: |
          set -eux
          apt-get update
          # --no-install-recommends: prove the hard Depends alone are a
          # complete closure, exactly what a minimal user system gets.
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            --no-install-recommends ./dist/*.deb

      - name: Verify installed layout and linkage
        run: |
          set -eux
          for b in veiland veiland-wallpaper veiland-clock \
                   veiland-particles veiland-vignette veiland-label \
                   veiland-sakura veiland-snow veiland-rain \
                   veiland-embers veiland-fireflies veiland-gradient \
                   veiland-parallax veiland-blobs veiland-raymarcher; do
            command -v "$b"
            test -x "/usr/bin/$b"
            # The binaries can't actually run in CI (no Wayland session),
            # but every shared library must resolve. On Ubuntu this is also
            # what would catch a library Debian has and Ubuntu names
            # differently.
            if ldd "/usr/bin/$b" | grep 'not found'; then
              echo "unresolved shared libraries in $b" >&2
              exit 1
            fi
          done
          test -f /etc/pam.d/veiland
          test -f /usr/share/veiland/config.example.toml
          test -f /usr/share/veiland/sakura-dusk.jpg
          test -f /usr/share/veiland/examples/sakura.toml
          test ! -e /usr/share/veiland/examples/hotplug-repro.toml
          # The install-time path rewrite: the shipped example must point
          # at the installed wallpaper, not the repo-relative path.
          grep -q 'path = "/usr/share/veiland/sakura-dusk.jpg"' \
            /usr/share/veiland/examples/sakura.toml

  fedora:
    name: Fedora (.rpm)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build tooling
        run: |
          dnf -y install rpm-build rpmdevtools tar git \
            cargo rust pkgconf-pkg-config \
            pam-devel mesa-libGL-devel mesa-libEGL-devel mesa-libgbm-devel \
            libdrm-devel wayland-devel libxkbcommon-devel

      - uses: actions/checkout@v4

      - name: Build package
        run: |
          # rpmbuild wants the source tree as a tarball named
          # %{name}-%{version}.tar.gz whose top dir is %{name}-%{version}.
          set -eux
          rpmdev-setuptree
          # Derive the version from the spec so the tarball name always
          # matches what %autosetup expects (was hardcoded and drifted
          # behind a version bump, breaking %prep).
          ver=$(rpmspec -q --qf '%{version}\n' packaging/rpm/veiland.spec | head -1)
          git config --global --add safe.directory "$PWD"
          # Stage a clean copy of the tree under veiland-$ver/ and tar it.
          git archive --format=tar --prefix="veiland-$ver/" HEAD \
            | gzip > "$HOME/rpmbuild/SOURCES/veiland-$ver.tar.gz"
          rpmbuild -ba packaging/rpm/veiland.spec
          ls -la "$HOME"/rpmbuild/RPMS/*/*.rpm
          # rpmbuild writes outside the workspace; upload-artifact
          # forbids '..' in paths, so copy the RPM into the workspace.
          # Only the main package: rpmbuild also emits -debuginfo and
          # -debugsource subpackages, and shipping those to the release
          # page made README's `dnf install ./veiland-*.x86_64.rpm`
          # glob install all three. veiland-$ver-* can't match them
          # (their names put -debuginfo-/-debugsource- before the
          # version) — same glob shape packaging/README.md uses.
          mkdir -p dist
          cp "$HOME"/rpmbuild/RPMS/*/veiland-"$ver"-*.rpm dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiland-fedora
          path: dist/*.rpm
          if-no-files-found: warn

      - name: Install gh
        if: github.event_name == 'release'
        # Only needed to attach release assets; kept out of the always-run
        # build-tooling step so push/PR validation doesn't install it.
        run: dnf -y install gh

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.rpm --clobber --repo "${{ github.repository }}"

  fedora-install:
    name: Fedora (install check)
    runs-on: ubuntu-latest
    # A pristine container: dnf must resolve the spec's Requires: from
    # the repos for real, which the build container can't demonstrate.
    container: fedora:latest
    needs: fedora
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: veiland-fedora
          path: dist

      - name: Install package
        run: |
          set -eux
          dnf -y install dist/*.rpm

      - name: Verify installed layout and linkage
        run: |
          set -eux
          # Everything packaging/rpm/veiland.spec %files promises.
          for b in veiland veiland-wallpaper veiland-clock \
                   veiland-particles veiland-vignette veiland-label \
                   veiland-sakura veiland-snow veiland-rain \
                   veiland-embers veiland-fireflies veiland-gradient \
                   veiland-parallax veiland-blobs veiland-raymarcher; do
            command -v "$b"
            test -x "/usr/bin/$b"
            # The binaries can't actually run in CI (no Wayland session),
            # but every shared library must resolve — this is what
            # catches a missing or misnamed runtime dependency.
            if ldd "/usr/bin/$b" | grep 'not found'; then
              echo "unresolved shared libraries in $b" >&2
              exit 1
            fi
          done
          test -f /etc/pam.d/veiland
          test -f /usr/share/veiland/config.example.toml
          test -f /usr/share/veiland/sakura-dusk.jpg
          test -f /usr/share/veiland/examples/sakura.toml
          test ! -e /usr/share/veiland/examples/hotplug-repro.toml
          # The install-time path rewrite: the shipped example must point
          # at the installed wallpaper, not the repo-relative path.
          grep -q 'path = "/usr/share/veiland/sakura-dusk.jpg"' \
            /usr/share/veiland/examples/sakura.toml
