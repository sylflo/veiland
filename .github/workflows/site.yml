# Build the Zola site and deploy it to GitHub Pages.
name: site

# Pushes to the site branch run the build job only (CI validation);
# the deploy job is gated to master, where the github-pages environment
# allows deployments.
on:
  push:
    branches: [master, site]
    paths:
      - "site/**"
      - "docs/examples/**"
      - "scripts/gen-plugins-md.py"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: v0.22.1
    steps:
      - uses: actions/checkout@v4
      - name: Check docs/plugins.md is in sync with site content
        run: python3 scripts/gen-plugins-md.py --check
      - name: Install Zola
        run: |
          curl -sSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Build
        run: ./site/build.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
