#
# Example veiland config: the starting point for customising your lock
# screen. Copy it and edit:
#
#   mkdir -p ~/.config/veiland
#   cp /usr/share/veiland/config.example.toml ~/.config/veiland/config.toml
#
# You do not need to copy it to get a scene. This is the "sakura" scene from
# the README gallery — dusk-sky wallpaper, falling cherry-blossom petals, a
# clock, the password pill — and veiland already renders it out of the box:
# the same scene is compiled into the binary and used whenever there is no
# user config (see veiland-core/src/default-scene.toml, its twin; change one
# and you probably want to change the other). Copy this file when you want to
# change something, not to get started.
#
# A user config replaces the default scene wholesale — the two are not
# merged, so what you write here is the entire scene.
#
# Each `binary` is a bare plugin name: the core resolves it beside the
# installed `veiland` binary (then on $PATH), so this works on any distro
# without hardcoding a bindir. Plugin `path` config values (like the
# wallpaper below) are read verbatim with no $PATH or ~ expansion, so
# those must be absolute. See docs/config.md for every option.

# --- Wallpaper: dusk-sky backdrop ----------------------------------
# z_index -100 keeps it behind everything. The package installs the
# wallpaper alongside this file; point `path` elsewhere for your own
# image. A wrong path is harmless: the plugin paints black and logs it,
# and the rest of the scene still renders.
[[plugin]]
name = "wallpaper"
binary = "veiland-wallpaper"
z_index = -100

[plugin.config]
path = "/usr/share/veiland/sakura-dusk.jpg"   # edit: point at your image

# --- Sakura: falling cherry-blossom petals -------------------------
# The petal texture is embedded in the binary, so there is nothing to
# supply. z_index 0 puts it just above the wallpaper.
[[plugin]]
name = "sakura"
binary = "veiland-sakura"
z_index = 0

[plugin.config]
count = 30
size_px = 22
# White tint = the petal PNG's own pink shows through. Lower the alpha
# to fade the whole field.
color = [1.0, 1.0, 1.0, 1.0]

# --- Clock: time + date, upper-left --------------------------------
# Uses the default system sans font (no CJK dependency). Positions are
# fractions of the surface, so they track any resolution.
[[plugin]]
name = "clock"
binary = "veiland-clock"
z_index = 10

[plugin.config]
time_format = "%H:%M"
date_format = "%A, %B %d"
time_font_size = 0.055        # fraction of surface height (~59px on 1080p)
date_font_size = 0.014        # fraction of surface height (~15px on 1080p)
time_color = [0.95, 0.96, 0.98, 0.95]
date_color = [0.95, 0.96, 0.98, 0.80]
time_position = [0.04, 0.05]  # fraction of surface, upper-left
date_position = [0.04, 0.11]
halign = "left"
valign = "top"
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.9]

# --- Password field: the input pill --------------------------------
# A wide, low, fully-rounded pill with a dark translucent fill and a
# faint light outline. Painted by the core on top of every plugin.
[password]
y_percent = 72
box_width = 440
box_height = 70
outline_thickness = 2
rounding = -1                              # full pill
inner_color = "rgba(28, 36, 52, 0.45)"
outer_color = "rgba(150, 170, 200, 0.45)"
dot_color = "rgba(235, 238, 245, 1.0)"
dot_diameter = 10
dot_spacing = 22
