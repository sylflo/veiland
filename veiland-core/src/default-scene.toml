#
# The default scene: compiled into veiland-core with include_str! and used
# when the user has no config file. It is the raymarcher scene from the
# README's hero shot (docs/examples/raymarcher.toml). Its user-facing twin
# is packaging/veiland.example.toml, which every package installs to
# <datadir>/config.example.toml as the starting point for customisation.
# The two are the same scene and will drift if nobody is looking — change
# both, or neither.
#
# The scene is fully self-contained: the raymarcher renders procedurally,
# so nothing has to be found on disk and a `cargo run` dev build shows the
# exact same scene as an installed package.
#
# Unlike the plugin defaults, the [password] table here is deliberate
# styling, not restated defaults: the pill's dark translucent fill and
# light outline are tuned to read over the busy tunnel.

# --- Raymarcher: slow raymarched gyroid tunnel ----------------------
# The camera drifts through the tunnels of a gyroid (a triply periodic
# minimal surface), fog swallowing the distance. Thermal defaults are
# deliberate: half-resolution render, at most 30 fps. A locker runs for
# hours.
[[plugin]]
name = "raymarcher"
binary = "veiland-raymarcher"
z_index = 0

[plugin.config]
speed = 1.0
fov_deg = 70.0
colors = [
  [0.08, 0.10, 0.18],
  [0.55, 0.30, 0.15],
  [0.20, 0.35, 0.40],
]
fog = 1.0
render_scale = 0.5
max_fps = 30.0

# --- Password field: the input pill ---------------------------------
[password]
y_percent = 68
box_width = 440
box_height = 70
outline_thickness = 2
rounding = -1                              # full pill
inner_color = "rgba(16, 20, 34, 0.50)"
outer_color = "rgba(150, 170, 200, 0.45)"
dot_color = "rgba(235, 238, 245, 1.0)"
dot_diameter = 10
dot_spacing = 22
