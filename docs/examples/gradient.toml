#
# Flowing gradient scene -- a slow looping color ramp.
#
# The ramp of up to four color stops drifts along a (slowly rotatable)
# axis. Defaults are rich but calm: indigo -> purple -> teal, one full
# loop every four minutes.

[[plugin]]
name = "gradient"
binary = "veiland-gradient"
z_index = -100

[plugin.config]
# 2-4 ramp stops, RGB in [0,1]. Fewer than 2 falls back to defaults.
colors = [
    [0.10, 0.16, 0.42], # rich indigo
    [0.38, 0.12, 0.48], # vivid purple
    [0.05, 0.36, 0.44], # bright teal
]
# Gradient axis in degrees. 0 = left-to-right, positive = clockwise.
angle_deg = 45.0
# Ramp cycles per minute. 0.25 = one loop every 4 minutes; bump to
# 6.0 (10s per loop) to eyeball the motion quickly.
speed = 0.6
# Axis rotation in degrees per minute. 0 = fixed axis.
rotate_deg_per_min = 0.0
# Ramp lengths visible per screen height. Smaller = broader bands.
scale = 0.75
