# Example — two labels exercising the
# veiland-text Label API end-to-end.
#
# Layout on a 1920x1080 surface:
#
#   latin    z=10  centred, white with drop shadow
#   japanese z=20  upper-third, no shadow
#
# The Latin label verifies the common case (Latin shaping, drop
# shadow, centre alignment). The Japanese label verifies that
# cosmic-text's shaping pipeline handles CJK — if you see tofu
# (□□□□) instead of "こんにちは", the dev system is missing a CJK
# font (install noto-fonts-cjk or distro equivalent; see
# install noto-fonts-cjk or distro equivalent).
#
# Run: VEILAND_CONFIG=docs/examples/label.toml veiland
#
# Note: each `binary` is a bare plugin name, resolved beside the running
# veiland binary (then on $PATH), so this works on any install. To run an
# unpackaged dev build, replace with a path (a value with a `/` is used
# verbatim), e.g. target/debug/veiland-label.

[[plugin]]
name = "label-latin"
binary = "veiland-label"
z_index = 10

[plugin.config]
text = "Hello veiland"
font_family = "Sans"
font_size = 0.059             # fraction of surface height (~64px on 1080p)
color = [0.95, 0.95, 0.95, 1.0]
halign = "center"
valign = "middle"
position = [0.5, 0.5]        # centre of the surface
rotation = 0
shadow_offset = [0.003, 0.003] # fraction of surface height (~3px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.6]
shadow_blur = 0.0

[[plugin]]
name = "label-japanese"
binary = "veiland-label"
z_index = 20

[plugin.config]
text = "こんにちは"
font_family = "Sans"
font_size = 0.074             # fraction of surface height (~80px on 1080p)
color = [1.0, 1.0, 1.0, 1.0]
halign = "center"
valign = "middle"
position = [0.5, 0.259]      # upper-third (~280/1080)
