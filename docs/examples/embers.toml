#
# Fire particle overlay -- rising sparks + bottom glow.
#
# Reproduces the classic fire-particles-overlay look: a warm orange-red glow
# along the bottom of the region with bright sparks rising from it, drifting
# slightly sideways, and fading out as they climb.
#
# Best run over a dark wallpaper + vignette. The plugin region should cover
# the full screen so sparks can travel the full height.

[[plugin]]
name = "embers"
binary = "veiland-embers"
z_index = 20

[plugin.config]
# Dense spark field. 60 is sparser/calmer, 120+ is a raging fire.
count = 80
# Bright yellow-orange hot sparks.
spark_color = [1.0, 0.65, 0.10, 1.0]
# Deep red-orange glow at the base.
glow_color = [0.80, 0.18, 0.02]
