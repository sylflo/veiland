# A STATUS CLUSTER scene: the top-right chip row every polished lockscreen has,
# built from the composable SVG status pills -- each its own plugin, placed a la
# carte, NOT one status-bar mega-plugin. This is the "at-rest picture" the widget
# roadmap is aiming at: several small glyphs that together read as a real daily
# driver.
#
# The row is battery + wifi + ethernet + bluetooth, right to left -- the full
# status cluster. Each pill is the battery_svg.py template: bucket a reading to a
# glyph, draw a centered pill. All are READ-ONLY. Drop any one you do not want,
# or reorder by swapping their x values.
#
# HOW THE ROW IS LAID OUT (resolution-independent, no pixels): every chip
# anchors to the top-right corner (halign=right, valign=top) with the same
# fractional width/height, the SAME margin_y (so all four share a top inset and
# line up), and a stepping margin_x that pushes each one further LEFT of the
# corner. margin_x/margin_y are per-axis anchor margins (margin_x a fraction of
# surface width, margin_y a fraction of height) -- exactly the case a single
# both-axes `margin` cannot express, since spacing chips horizontally with it
# would also push them down. Because every value is a fraction of the surface,
# the whole row keeps its shape on 1080p/1440p/4K. See docs/config.md.
#
# The rightmost chip has the smallest margin_x; each chip to its left adds
# (width + gap) ~= 0.031 + 0.011 = 0.042. So battery = 0.013, wifi = 0.055,
# ethernet = 0.097, bluetooth = 0.139. Reorder by swapping margin_x values; drop
# any chip you do not want.
#
# Prerequisites: the SVG stack (pygobject3 + librsvg + the Rsvg typelib) and
# jeepney, both wired by the flake's dev shell -- run veiland from the repo root
# inside `nix develop`. The plugin scripts must be chmod +x (they are in-tree).

# A full-surface gradient wallpaper BEHIND the chips (z_index -100). Not just
# decor: the host clears the lock surface to opaque black each repaint and
# re-composites plugins on top, so translucent chips on a BARE surface would
# flash black through their transparent areas on every keystroke. An opaque
# full-surface plugin underneath covers the clear. Any wallpaper/ambient plugin
# works; gradient is self-contained (no image file).
[[plugin]]
name = "gradient"
binary = "veiland-gradient"
z_index = -100
[plugin.config]
colors = [
    [0.10, 0.16, 0.42],
    [0.38, 0.12, 0.48],
    [0.05, 0.36, 0.44],
]
angle_deg = 45.0
speed = 0.6

# --- the chip row (anchored, resolution-independent, right to left) -----------
# All chips share halign=right, valign=top, width/height, and margin_y (so they
# top-align); only margin_x steps to space them horizontally.
#
# Every chip also takes optional [plugin.config] theming: pill_color (the chip,
# RGBA 0..1 floats where the fourth value is the opacity; [0, 0, 0, 0] = no chip)
# and icon_color (tints the white glyph; unset = white as authored). This row
# leaves all four on the defaults so it reads as one visual language; if you
# theme it, set the SAME pair on every chip. status_cluster_color.toml is this
# same row deliberately re-themed LOUD, one color pair per chip; the standalone
# scenes show single variants (wifi.toml light chip + dark glyph, ethernet.toml
# pill only, bluetooth.toml both, battery_svg.toml the defaults, commented).

# Battery: rightmost chip, smallest margin_x (hugs the corner).
[[plugin]]
name = "veiland-battery-svg"
binary = "./python/examples/battery_svg.py"
z_index = 10
region = { halign = "right", valign = "top", width = 0.031, height = 0.056, margin_x = 0.013, margin_y = 0.013 }

# Wifi: one slot to the LEFT of battery (margin_x += width + gap).
# NetworkManager over the SYSTEM bus; wifi-off when the radio is disabled.
[[plugin]]
name = "veiland-wifi"
binary = "./python/examples/wifi.py"
z_index = 10
region = { halign = "right", valign = "top", width = 0.031, height = 0.056, margin_x = 0.055, margin_y = 0.013 }

# Ethernet: one slot left of wifi, same wired NetworkManager source; the
# network-wired glyph shows up vs down (unplugged / no device / no bus -> down).
[[plugin]]
name = "veiland-ethernet"
binary = "./python/examples/ethernet.py"
z_index = 10
region = { halign = "right", valign = "top", width = 0.031, height = 0.056, margin_x = 0.097, margin_y = 0.013 }

# Bluetooth: leftmost chip, bluez over the SYSTEM bus; the rune shows off /
# on / connected (adapter powered + any device connected).
[[plugin]]
name = "veiland-bluetooth"
binary = "./python/examples/bluetooth.py"
z_index = 10
region = { halign = "right", valign = "top", width = 0.031, height = 0.056, margin_x = 0.139, margin_y = 0.013 }

# Password indicator near the bottom-center, clear of the top-right cluster. `x`
# unset -> the core centers it horizontally; `y_percent` is the box CENTER as a
# percent of surface height.
[password]
y_percent = 92
