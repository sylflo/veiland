#
# A calm lock scene: a dusk-sky wallpaper, falling cherry-blossom
# petals, a clock, and a styled password pill. Works on a plain install
# with almost no setup — the only asset is the wallpaper JPG that ships
# next to this file, and the fonts are whatever your distro already has.
#
# Install layout this file assumes:
#   * Each `binary` is a bare plugin name. The core resolves it beside the
#     installed `veiland` binary (then on $PATH), so this works on any
#     distro without hardcoding a bindir. If you're running an unpackaged
#     dev build, replace each with a path instead, e.g.
#     binary = "veiland-sakura" (a value with a `/` is used
#     verbatim).
#   * The wallpaper `path` (a plugin config value, not a binary) IS opened
#     directly with no `~` expansion, so it must be a full absolute path.
#   * No `monitors` key on any plugin => each runs on *every* connected
#     output, one process per output. Nothing here is monitor-specific.
#
# Run it in place from the repo root, without installing anything:
#   VEILAND_CONFIG=docs/examples/sakura.toml veiland
#
# To install it, copy BOTH the config and the wallpaper, then fix the
# wallpaper `path` below to the absolute location you copied it to:
#   mkdir -p ~/.config/veiland
#   cp docs/examples/sakura.toml            ~/.config/veiland/config.toml
#   cp docs/examples/assets/sakura-dusk.jpg ~/.config/veiland/
#   # then edit the wallpaper path below to:
#   #   /home/YOU/.config/veiland/sakura-dusk.jpg
#   veiland            # or bind it to a key / idle daemon
#
# Wallpaper credit: photo by Unsplash, used under the Unsplash License
# (free commercial use and redistribution, no attribution required). If
# the path is wrong the wallpaper plugin just paints black and logs it —
# the rest of the scene (petals, clock, pill) still works.

# --- Wallpaper: dusk-sky backdrop ----------------------------------
# z_index -100 keeps it behind everything. The path below is relative
# to the repo root, which is the working directory when you launch with
# VEILAND_CONFIG=docs/examples/sakura.toml from the repo. For an
# installed setup, change this to an absolute path (see the header).
[[plugin]]
name = "wallpaper"
binary = "veiland-wallpaper"
z_index = -100

[plugin.config]
path = "docs/examples/assets/sakura-dusk.jpg"

# --- Sakura: falling cherry-blossom petals -------------------------
# The petal texture is embedded in the binary, so there is nothing to
# supply. z_index 0 puts it at the back; the clock sits in front.
[[plugin]]
name = "sakura"
binary = "veiland-sakura"
z_index = 0

[plugin.config]
count = 30
size_px = 22
# White tint = the petal PNG's own pink shows through. Lower the alpha
# to fade the whole field.
color = [1.0, 1.0, 1.0, 1.0]

# --- Clock: time + date, upper-left --------------------------------
# Uses the default system sans font (no CJK dependency). Positions are
# fractions of the surface, so they track any resolution.
[[plugin]]
name = "clock"
binary = "veiland-clock"
z_index = 10

[plugin.config]
time_format = "%H:%M"
date_format = "%A, %B %d"
time_font_size = 0.055        # fraction of surface height (~59px on 1080p)
date_font_size = 0.014        # fraction of surface height (~15px on 1080p)
time_color = [0.95, 0.96, 0.98, 0.95]
date_color = [0.95, 0.96, 0.98, 0.80]
time_position = [0.04, 0.05]  # fraction of surface, upper-left
date_position = [0.04, 0.11]
halign = "left"
valign = "top"
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.9]

# --- Password field: the input pill --------------------------------
# A wide, low, fully-rounded pill with a dark translucent fill and a
# faint light outline. Painted by the core on top of every plugin.
[password]
y_percent = 72
box_width = 440
box_height = 70
outline_thickness = 2
rounding = -1                              # full pill
inner_color = "rgba(28, 36, 52, 0.45)"
outer_color = "rgba(150, 170, 200, 0.45)"
dot_color = "rgba(235, 238, 245, 1.0)"
dot_diameter = 10
dot_spacing = 22
