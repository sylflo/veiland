# Example — exercises the [password] config table and the soft
# trust-region paint order ("indicator always wins over plugins").
#
# Layout on a 1920x1080 surface:
#
#   blue-box  z=0  region (560, 720, 800, 200)
#
# The blue box is deliberately placed across the default indicator
# position (centred horizontally, y=75% = y_px=810 on 1080). Type
# any character: the grey dots paint *on top of* the blue box —
# that's the "indicator always wins on paint order" behaviour from
# CLAUDE.md §"Threat model".
#
# The [password] table overrides nothing — defaults all the way.
# Edit individual fields (uncomment below) to see them take effect
# without rebuilding the locker.
#
# Run: VEILAND_CONFIG=docs/examples/password.toml cargo run -p veiland-core
#
# Note: bare binary names resolve beside the running veiland binary
# first, then on $PATH -- works in-repo and on an installed system.

[[plugin]]
name = "blue-box"
binary = "veiland-blue-box"
z_index = 0
region = { x = 560, y = 720, w = 800, h = 200 }

[password]
# Centre of the dot row in surface-pixel coords. Omit → centred on
# each surface's width / 2 (per-monitor).
# x = 960

# Vertical position as % of surface height (0..=100). Omit → 75.
# Clamped to [0, 100] at load with a warning if out of range.
# y_percent = 75

# Dot diameter in surface pixels. Default 12, clamped [1, 100].
# dot_diameter = 12

# Centre-to-centre stride between dots in surface pixels.
# Default 20, clamped [1, 200]. With diameter 12 the default leaves
# an 8-px gap between dot edges.
# dot_spacing = 20

# Cap on visible dot count. Default 32, clamped [1, 256]. Beyond
# this the row freezes — typing still works.
# max_dots = 32

# --- Input box (defaults shown; the box is on by default) ---
# show_box = true              # false → bare dots floating on wallpaper
# box_width = 400              # surface px, clamped [1, 8192]
# box_height = 90              # surface px, clamped [1, 8192]
# outline_thickness = 2        # surface px, clamped [0, box_height/2]
# rounding = -1                # corner radius px; -1 = full pill
# inner_color = "rgba(34, 41, 56, 0.55)"     # box fill
# outer_color = "rgba(180, 190, 210, 0.55)"  # box outline
# dot_color  = "rgba(220, 220, 220, 1.0)"    # dot fill

# --- Placeholder (shown in the empty box; "" disables) ---
# placeholder_text = "Enter to remember..."
# placeholder_color = "rgba(200, 205, 215, 0.6)"
# placeholder_font_family = "Sans"
# placeholder_font_size = 18
