# Test config for the markup widget (python/examples/markup.py): ONE block of
# Pango markup with {variable} substitution, composited over the wallpaper. This
# is the DYNAMIC text tier -- variables and inline <span> styling -- additive to
# the Rust veiland-label plugin (the lean static tier), not a replacement.
#
# This scene is a clock-style time+date block: a big bold time over a smaller
# date line, done as ONE markup string instead of two fixed labels -- the widget
# subsumes the clock look while adding {variables}. With an EMPTY [plugin.config]
# it draws exactly this default block (the `text` below just spells it out).
#
# The `text` string may contain BOTH Pango <span> tags (inline size/weight/color,
# no config DSL to learn) AND {placeholders}: {user}, {name} (your GECOS full
# name), {host}, {time:STRFTIME}, {date:STRFTIME}. A {time:%H:%M} line redraws
# once a minute; a static line never redraws after the first frame. A bad
# strftime spec shows the literal "{time:...}" so you can fix it; malformed
# markup falls back to plain text -- neither ever crashes the locker.
#
# This needs the gi stack: pygobject3 + Pango/PangoCairo typelibs on
# GI_TYPELIB_PATH (the flake's dev shell wires them; run from `nix develop`).
#
# The binary path is relative, so run veiland from the repo root; the script
# must be chmod +x or the host spawn fails with "Permission denied (os error
# 13)". The ANCHORED region form is fractions of the surface, so the block lands
# identically on 1080p and 4K; the font size derives from the region height. See
# docs/config.md.
[[plugin]]
name = "markup-clock"
binary = "./python/examples/markup.py"
z_index = 10
# Region pinned to the screen's TOP-LEFT corner (halign/valign = left/top with
# zero margins) so the box's corner IS the display corner. Combined with the
# content_* keys below this is the motivating flush-corner case -- see it live.
region = { halign = "left", valign = "top", width = 0.5, height = 0.22, margin_x = 0, margin_y = 0 }

[plugin.config]
# text: a Pango markup string with {variable} placeholders. \n splits lines; the
# <span> tag styles a run inline (overriding the base font below). Use single
# quotes so the double quotes inside the <span> need no escaping.
text = '''<span size="xx-large" weight="bold">{time:%H:%M}</span>
{date:%A %d %B}'''

# Park the text at the box's top-left and outline the box so you can SEE the
# content anchor working: the block sits flush in the corner instead of centered,
# and the magenta frame traces the region. Remove these three lines (or set them
# to center/center) for the default centered look.
content_halign = "left"
content_valign = "top"
debug_border = true

# Everything below is optional -- these are the defaults spelled out.
#
# The base font, same keys (and defaults) as the Rust label plugin. font_size is
# a FRACTION of the region height; an inline <span size=...> overrides it:
# font_family = "Sans"     # any fontconfig family; falls back to Sans if absent.
#                          # The dev shell also ships "Dancing Script" (a cursive
#                          # handwriting font) -- try it, see the greeting below.
# font_size   = 0.20       # base size as a fraction of the region height (an
#                          # inline <span size=...> scales relative to this)
# font_weight = 400        # CSS numeric 100..900 (the block's base weight)
# italic      = false
#
# Placement of the laid-out block WITHIN its region (the content-anchor
# convention -- see docs/config.md; distinct from the region's own halign on the
# region line above: that places the BOX, these place the TEXT inside it):
# content_halign = "center"   # or "left" / "right" (also sets multi-line justify)
# content_valign = "center"   # or "top" / "bottom"
#
# The motivating flush-left recipe: content_halign = "left" together with
# margin_x = 0 on the region line pins the text to the screen's left edge.
#
# Debug aid while tuning placement -- stroke the (invisible) region box so you
# can see where it landed and where your content sits in it. Off by default:
# debug_border = true
# debug_border_color = [1.0, 0.0, 1.0, 1.0]   # bright magenta; loud on purpose
#
# Colors are RGBA floats 0..1 where the fourth value IS the opacity:
# text_color   = [1.0, 1.0, 1.0, 0.96]
# shadow_color = [0.0, 0.0, 0.0, 0.45]   # soft drop shadow; alpha 0 -> no shadow
#
# An OPTIONAL frosted chip behind the text -- a rounded card the block sits on,
# handy over a busy wallpaper. Absent (or alpha 0) -> no chip, byte-identical to
# bare markup. The chip tracks the same content anchor as the text, so the two
# move together; give it a region with some slack (don't anchor the text flush
# to an edge) so the padding isn't clipped:
# bg_color   = [0.059, 0.071, 0.110, 0.69]   # the family glass; absent -> off
# bg_radius  = 0.5    # corner radius as a fraction of the chip HEIGHT
#                     # (0.5 -> a full capsule, matching the pill widgets)
# bg_padding = 0.5    # breathing room around the text, as a fraction of font px

# A SECOND markup region, live alongside the clock above: one flowing handwritten
# line on a frosted chip, parked bottom-center as a caption -- so this scene shows
# BOTH the content-anchor/border demo (top-left) and the new background chip
# (bottom). font_family = "Dancing Script" is the cursive font the dev shell ships
# (fontconfig falls back to Sans if it isn't installed); bg_color is the family
# glass, so the line reads as a floating pill over the wallpaper -- the greeting
# look, from the generic markup widget.
[[plugin]]
name = "markup-greeting"
binary = "./python/examples/markup.py"
z_index = 10
region = { halign = "center", valign = "bottom", width = 0.6, height = 0.1, margin_y = 0.1 }

[plugin.config]
text = 'Good evening, <span foreground="#8ab4f8">{name}</span>'
font_family = "Dancing Script"
content_valign = "center"
bg_color = [0.427, 0.027, 0.102, 1.0]   # the frosted greeting chip
font_size   = 0.50 