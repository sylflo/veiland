# Test config for the SVG battery example (python/examples/battery_svg.py): a
# monochrome-white battery glyph, rendered from an SVG via librsvg through the
# optional veiland_svg companion, inside a small circular translucent pill inset
# from the top-right corner (matching the reference lockscreen's status chip).
# An if/else picks a bucketed icon (battery-25/50/75/100.svg, battery-charging
# .svg) and draw_svg blits it onto the same cairo context that writes into
# buf.map() -- the copy-me template for status-icon widgets. Just the battery,
# no label, so the SVG pill is what you are evaluating.
#
# Unlike the cairo/PIL battery examples this needs the SVG stack: pygobject3 +
# librsvg + the Rsvg typelib on GI_TYPELIB_PATH. The flake's dev shell wires it,
# so run veiland from inside `nix develop`.
#
# The binary path is relative, so run veiland from the repo root (the host
# resolves it against its own working directory); a name-based plugin search
# path is deferred, see docs/plans/python-sdk.md. The script must be chmod +x
# or the host spawn fails with "Permission denied (os error 13)".
#
# [plugin.region] places the widget in a small box near the top-right. The host
# sizes the plugin's buffer to the region and composites it there 1:1 (no
# stretch), so battery_svg.py just centers the pill in its own buffer -- no
# screen-relative math. This is the status-chip model: the host owns WHERE the
# box is, the plugin owns WHAT fills it (a centered pill).
#
# This uses the ANCHORED form: halign/valign pin the box to a screen corner and
# width/height/margin are FRACTIONS of the surface (like veiland's label/clock
# text sizing), resolved host-side against each output's live size. So the chip
# hugs the top-right and looks the same relative size on 1080p, 1440p, and 4K --
# one config, every monitor. (The explicit-pixel escape hatch still exists:
# region = { x = 1836, y = 24, w = 60, h = 60 } -- but that only lands correctly
# on the one resolution it was tuned for.) See docs/config.md.
[[plugin]]
name = "veiland-battery-svg"
binary = "./python/examples/battery_svg.py"
z_index = 10
region = { halign = "right", valign = "top", width = 0.031, height = 0.056, margin = 0.013 }
