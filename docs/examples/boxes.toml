# Example — three coloured-box plugins at known z-indexes and
# overlapping regions. Demonstrates the compositor's region clipping
# and z-ordering.
#
# Layout: a 200-pixel staircase of overlapping rectangles on a
# 1920x1080 surface.
#
#   blue   z=0   region (200, 200, 800, 600)   70% opacity
#   red    z=10  region (400, 400, 800, 600)   50% opacity
#   green  z=20  region (600, 600, 800, 600)   fully opaque
#
# Expected visual (alpha values tuned to make each zone visually
# distinct — the plan's first 78%/50% choices produced overlap zones
# that were technically correct but very subtle):
#
#   - Black where nothing covers (the lock-surface clear color).
#   - Medium blue (0, 0, 0.7) where only blue covers.
#   - Medium red (0.5, 0, 0) where only red covers.
#   - Clear purple (0.5, 0, 0.35) where red overlaps blue without
#     green on top.
#   - Bright green (0, 1, 0) where green covers, regardless of what's
#     below (green is fully opaque).
#
# Run: VEILAND_CONFIG=docs/examples/boxes.toml cargo run -p veiland-core
#
# Note: binary paths are absolute and target/debug/. Adjust if you
# build elsewhere or rename the workspace target directory.

[[plugin]]
name = "blue-box"
binary = "/home/sylflo/Projects/veiland/target/debug/veiland-blue-box"
z_index = 0
region = { x = 200, y = 200, w = 800, h = 600 }

[[plugin]]
name = "red-box"
binary = "/home/sylflo/Projects/veiland/target/debug/veiland-red-box"
z_index = 10
region = { x = 400, y = 400, w = 800, h = 600 }
monitors = ["HDMI-A-1"]

[[plugin]]
name = "green-box"
binary = "/home/sylflo/Projects/veiland/target/debug/veiland-green-box"
z_index = 20
region = { x = 600, y = 600, w = 800, h = 600 }