# --- Title (English) — small, dim, above the Japanese title --------
[[plugin]]
name = "title-english"
binary = "target/debug/veiland-label"
z_index = 30

[plugin.config]
text = "YOUR NAME"
font_family = "Noto Sans CJK JP"
font_size = 0.016             # fraction of surface height (~17px on 1080p)
font_weight = 300
letter_spacing = 0.6          # fraction of font size (~6px with a 10px font)
color = [0.91, 0.96, 0.97, 0.6]
halign = "center"
valign = "middle"
# position is a FRACTION of the surface ([0.5, 0.5] = centre), so it tracks
# any resolution. Title block sits above centre (matched to the mockup's
# vertical layout); the English line sits just above the Japanese title.
position = [0.5, 0.347]
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.8]

# --- Title (Japanese) — large, bright, the main visual -------------
[[plugin]]
name = "title-japanese"
binary = "target/debug/veiland-label"
z_index = 31

[plugin.config]
text = "君の名は。"
font_family = "Noto Sans CJK JP"
font_size = 0.035             # fraction of surface height (~38px on 1080p)
font_weight = 300
letter_spacing = 0.4          # fraction of font size (~8px with a 20px font)
color = [0.91, 0.96, 0.97, 0.95]
halign = "center"
valign = "middle"
position = [0.5, 0.387]
shadow_offset = [0, 0.004]    # fraction of surface height (~4px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.9]

# --- Quote (English) — below the title -----------------------------
[[plugin]]
name = "quote-english"
binary = "target/debug/veiland-label"
z_index = 40

[plugin.config]
text = "Once in a while when I wake up, I find myself crying."
# Italic to match the mockup. cosmic-text selects a real italic FACE (it
# doesn't synthesize a slant), and "Noto Sans CJK JP" ships no italic, so
# this Latin-only line uses "Liberation Sans" which has one. Swap to any
# family with an installed italic face if you prefer.
font_family = "Liberation Sans"
font_size = 0.022             # fraction of surface height (~24px on 1080p)
font_weight = 300
italic = true
color = [0.91, 0.96, 0.97, 0.9]
halign = "center"
valign = "middle"
position = [0.5, 0.505]
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.9]

# --- Quote (Japanese) — smaller, dimmer, below the English quote ---
[[plugin]]
name = "quote-japanese"
binary = "target/debug/veiland-label"
z_index = 41

[plugin.config]
text = "たまに、目が覚めると泣いている"
font_family = "Noto Sans CJK JP"
font_size = 0.018             # fraction of surface height (~19px on 1080p)
letter_spacing = 0.167        # fraction of font size (~2px with a 12px font)
color = [0.91, 0.96, 0.97, 0.7]
halign = "center"
valign = "middle"
position = [0.5, 0.559]
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.8]

# --- Clock: time + date, upper-left, above everything --------------
[[plugin]]
name = "clock"
binary = "target/debug/veiland-clock"
z_index = 50

[plugin.config]
time_format = "%H:%M"
date_format = "%B %d, %Y"
font_family = "Noto Sans CJK JP"
font_weight = 100
time_font_size = 0.055        # fraction of surface height (~59px on 1080p)
date_font_size = 0.012        # fraction of surface height (~13px on 1080p)
time_letter_spacing = 0.118   # fraction of font size (~4px with a 34px font)
date_letter_spacing = 0.286   # fraction of font size (~2px with a 7px font)
time_color = [0.91, 0.96, 0.97, 0.9]
date_color = [1.0, 1.0, 1.0, 0.9]
# Fractions of the surface — upper-left, resolution-independent.
time_position = [0.026, 0.046]
date_position = [0.026, 0.105]
halign = "left"
valign = "top"
shadow_offset = [0, 0.002]    # fraction of surface height (~2px on 1080p)
shadow_color = [0.0, 0.0, 0.0, 0.9]

# --- Password field: the input box + dots --------------------------
# Tuned to the mockup: a wide, low, fully-rounded pill with a dark
# translucent fill, a faint light outline, and small white dots. The
# box auto-centres the dots, so y_percent positions both. Painted by
# the core on top of every plugin above.
[password]
y_percent = 63
box_width = 440
box_height = 70
outline_thickness = 2
rounding = -1                              # full pill
inner_color = "rgba(28, 36, 52, 0.45)"
outer_color = "rgba(150, 170, 200, 0.45)"
dot_color = "rgba(235, 238, 245, 1.0)"
dot_diameter = 10
dot_spacing = 22
# Placeholder hint shown until the first keystroke. Italic-leaning
# family for the dreamy vibe; "" would leave the box empty.
placeholder_text = "Enter to remember..."
placeholder_color = "rgba(220, 225, 235, 0.55)"
placeholder_font_family = "Liberation Sans"
placeholder_font_size = 17
